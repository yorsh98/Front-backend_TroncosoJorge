services:
  app:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: proviemplea_app
    working_dir: /var/www/html
    volumes:
      - ./backend-api:/var/www/html
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: proviemplea_nginx
    ports:
      - "8088:80"
    volumes:
      - ./backend-api:/var/www/html:ro
      - ./docker/backend/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  mysql:
    image: mysql:8.4
    container_name: proviemplea_mysql
    environment:
      MYSQL_DATABASE: proviemplea
      MYSQL_USER: proviemplea_user
      MYSQL_PASSWORD: proviemplea_password
      MYSQL_ROOT_PASSWORD: proviemplea_root_password
    ports:
      - "33068:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    container_name: proviemplea_mailpit
    ports:
      - "8025:8025"
      - "1025:1025"

  queue-worker:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: proviemplea_queue_worker
    working_dir: /var/www/html
    command: php artisan queue:work database --sleep=3 --tries=3 --timeout=120
    volumes:
      - ./backend-api:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy

  scheduler:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: proviemplea_scheduler
    working_dir: /var/www/html
    command: sh -c "while true; do php artisan schedule:run --no-interaction; sleep 60; done"
    volumes:
      - ./backend-api:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
